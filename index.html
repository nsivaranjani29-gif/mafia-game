<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mafia Role Assigner</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: #fff;
  }
  input, button {
    padding: 12px;
    font-size: 16px;
    margin: 10px;
    border-radius: 8px;
    border: none;
  }
  button {
    cursor: pointer;
  }
  #role {
    font-size: 28px;
    margin: 20px;
  }
</style>
</head>
<body>

<h1>🎭 Mafia Role Assigner</h1>

<div id="game">
  <input type="number" id="playerCount" placeholder="Enter players (min 5)" min="5">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<script>
let roles = [];
let currentPlayer = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function startGame() {
  let count = parseInt(document.getElementById("playerCount").value);

  if (!count || count < 5) {
    alert("Enter at least 5 players");
    return;
  }

  roles = [];

  // Add special roles
  roles.push("Doctor");
  roles.push("Detective");

  // Mafia ~ 1/3 of players
  let mafiaCount = Math.floor(count / 3);

  for (let i = 0; i < mafiaCount; i++) {
    roles.push("Mafia");
  }

  // Remaining are villagers
  while (roles.length < count) {
    roles.push("Villager");
  }

  shuffle(roles);
  currentPlayer = 0;
  showNext();
}

function showNext() {
  if (currentPlayer >= roles.length) {
    document.getElementById("game").innerHTML =
      "<h2>All roles assigned 🎉</h2>";
    return;
  }

  document.getElementById("game").innerHTML = `
    <h2>Player ${currentPlayer + 1}</h2>
    <button onclick="revealRole()">Reveal Role</button>
  `;
}

function revealRole() {
  document.getElementById("game").innerHTML = `
    <h2>Player ${currentPlayer + 1}</h2>
    <div id="role">${roles[currentPlayer]}</div>
    <button onclick="hideRole()">Hide & Pass</button>
  `;
}

function hideRole() {
  currentPlayer++;
  showNext();
}
</script>

</body>
</html>
