<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- IMPORTANT: makes it mobile responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mafia Role Assigner</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
  }

  #container {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    margin-bottom: 15px;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    font-weight: bold;
  }

  button:active {
    transform: scale(0.97);
  }

  #role {
    font-size: 32px;
    margin: 30px 0;
    font-weight: bold;
  }

  .card {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 16px;
  }
</style>
</head>

<body>

<div id="container">
  <h1>🎭 Mafia</h1>
  <div id="game" class="card">
    <input type="number" id="playerCount" placeholder="Number of players (min 5)">
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<script>
let roles = [];
let currentPlayer = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function startGame() {
  let count = parseInt(document.getElementById("playerCount").value);

  if (!count || count < 5) {
    alert("Enter at least 5 players");
    return;
  }

  roles = [];

  roles.push("Doctor");
  roles.push("Detective");

  let mafiaCount = Math.floor(count / 3);

  for (let i = 0; i < mafiaCount; i++) {
    roles.push("Mafia");
  }

  while (roles.length < count) {
    roles.push("Villager");
  }

  shuffle(roles);
  currentPlayer = 0;
  showNext();
}

function showNext() {
  if (currentPlayer >= roles.length) {
    document.getElementById("game").innerHTML =
      "<h2>All roles assigned 🎉</h2>";
    return;
  }

  document.getElementById("game").innerHTML = `
    <h2>Player ${currentPlayer + 1}</h2>
    <button onclick="revealRole()">Reveal Role</button>
  `;
}

function revealRole() {
  document.getElementById("game").innerHTML = `
    <h2>Player ${currentPlayer + 1}</h2>
    <div id="role">${roles[currentPlayer]}</div>
    <button onclick="hideRole()">Hide & Pass</button>
  `;
}

function hideRole() {
  currentPlayer++;
  showNext();
}
</script>

</body>
</html>
